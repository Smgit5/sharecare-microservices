spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service-auth
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**,/users/**

            - id: campaign-service
              uri: lb://CAMPAIGN-SERVICE
              predicates:
                - Path=/campaigns/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

