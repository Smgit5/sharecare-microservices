spring:
  application:
    name: AUTH-SERVICE

# DB properties - start
  datasource:
    username: postgres
    password: smpostgres
    url: jdbc:postgresql://localhost:5432/sharecare_auth_db

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
# DB properties - end

# Mail related properties - start
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_SENDER_USERNAME}
    password: ${EMAIL_SENDER_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
# Mail related properties - end

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultzone: http://localhost:8761/eureka

